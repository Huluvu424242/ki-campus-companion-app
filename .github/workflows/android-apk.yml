name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Verify Android host project exists
        run: |
          if [ ! -d android ]; then
            echo "android/ directory missing. This workflow intentionally uses the committed Android project unchanged." >&2
            echo "Run: flutter create --platforms=android --project-name ki_campus_companion ." >&2
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare named APK artifact
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          from pathlib import Path
          for line in Path('pubspec.yaml').read_text(encoding='utf-8').splitlines():
              if line.startswith('version:'):
                  print(line.split(':', 1)[1].strip())
                  break
          else:
              raise SystemExit('pubspec.yaml version is missing')
          PY
          )"
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/ki-campus-companion-app-${version}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ki-campus-companion-app-release-apk
          path: artifacts/ki-campus-companion-app-*.apk
          if-no-files-found: error
          retention-days: 30
