name: Mutation Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  mutation-tests:
    name: Run experimental mutation tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run baseline tests
        run: flutter test

      - name: Install mutagen
        run: dart pub global activate mutagen

      - name: Run mutagen
        run: dart pub global run mutagen
