name: ki_campus_companion
description: MVP Flutter companion app for KI-Campus learning notes, bookmarks and local progress markers.
publish_to: "none"

version: 0.1.1+3

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.13.0
  webview_flutter_android: 4.10.1
  shared_preferences: ^2.5.0
  path_provider: ^2.1.5
  share_plus: ^10.1.0
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
